name: Build

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: httpdイメージをビルド
        run: |
          docker build -f Dockerfile.httpd -t phalcon-study-httpd:test .

      - name: phpイメージをビルド
        run: |
          docker build -f Dockerfile.php -t phalcon-study-php:test .