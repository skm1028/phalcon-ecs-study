name: CI

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build php image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.php
          push: false
          tags: phalcon-ecs-study-php:local

      - name: Build httpd image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.httpd
          push: false
          tags: phalcon-ecs-study-httpd:local
